services:
  postgres:
    image: postgres:16-alpine
    container_name: mrmf-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mrmf
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mrmf"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mrmf-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  postgres-data:
